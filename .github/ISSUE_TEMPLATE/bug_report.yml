name: Bug report
description: Report a public-safe bug in the synthetic JSONL vault spike
title: "Bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Keep this public-safe. Do not paste real vault data, private messages, emails, filesystem paths, credentials, screenshots, or exports.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the bug using synthetic/minimal examples.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Run `...`
        2. See `...`
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation output
      description: Paste public-safe command output such as `make check`.
    validations:
      required: false
