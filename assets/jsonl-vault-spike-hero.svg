<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="360" viewBox="0 0 1000 360" role="img" aria-labelledby="title desc">
  <title id="title">JSONL Vault Spike</title>
  <desc id="desc">Synthetic raw evidence becomes typed JSONL records, agent bundles, SQLite and Markdown views.</desc>
  <rect width="1000" height="360" fill="#0b1020"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#38bdf8"/><stop offset="1" stop-color="#a78bfa"/></linearGradient>
  </defs>
  <circle cx="870" cy="70" r="170" fill="#1e293b" opacity="0.65"/>
  <circle cx="110" cy="320" r="160" fill="#111827" opacity="0.8"/>
  <text x="56" y="78" fill="#e5e7eb" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="42" font-weight="800">JSONL Vault Spike</text>
  <text x="58" y="116" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20">Agent-readable personal knowledge, with synthetic data only</text>
  <g font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700">
    <rect x="58" y="168" width="170" height="78" rx="16" fill="#111827" stroke="#334155"/>
    <text x="82" y="201" fill="#e2e8f0">RAW JSONL</text>
    <text x="82" y="226" fill="#38bdf8" font-size="14">evidence log</text>
    <path d="M238 207 H326" stroke="url(#g)" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="336" y="168" width="184" height="78" rx="16" fill="#111827" stroke="#334155"/>
    <text x="360" y="201" fill="#e2e8f0">TYPED RECORDS</text>
    <text x="360" y="226" fill="#38bdf8" font-size="14">claims · entities · tasks</text>
    <path d="M530 207 H618" stroke="url(#g)" stroke-width="4"/>
    <rect x="628" y="168" width="154" height="78" rx="16" fill="#111827" stroke="#334155"/>
    <text x="652" y="201" fill="#e2e8f0">BUNDLES</text>
    <text x="652" y="226" fill="#38bdf8" font-size="14">bounded context</text>
    <path d="M792 207 H864" stroke="url(#g)" stroke-width="4"/>
    <rect x="874" y="168" width="70" height="78" rx="16" fill="#111827" stroke="#334155"/>
    <text x="895" y="201" fill="#e2e8f0">AI</text>
    <text x="889" y="226" fill="#38bdf8" font-size="14">ready</text>
  </g>
  <text x="58" y="304" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">Markdown becomes a generated view — JSONL records stay canonical.</text>
</svg>
